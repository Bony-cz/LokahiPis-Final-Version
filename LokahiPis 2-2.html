<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LokahiPis 2</title>
<style>


  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background-color: #20e4b9;
    background-image: linear-gradient(43deg, #078a69 0%, #50e4bf 46%, #00fff2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    padding-bottom: 40px;
  }


  .logo-img {
    margin-top: 30px;
    width: 80px;
    height: auto;
  }


  .title-container {
    margin-top: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 0 16px;
  }

  .title {
    font-size: 2rem;
    font-weight: bold;
    color: #131313;
    margin: 10px 0;
    text-align: center;
  }


  .button-container {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    padding: 0 16px;
  }


  .boton-elegante,
  .boton-elegante1 {
    padding: 14px 32px;
    border: 2px solid #2c2c2c;
    background-color: #1a1a1a;
    color: #ffffff;
    font-size: 1.2rem;
    cursor: pointer;
    border-radius: 30px;
    transition: all 0.4s ease;
    outline: none;
    position: relative;
    overflow: hidden;
    font-weight: bold;
  }

  .boton-elegante::after,
  .boton-elegante1::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      circle,
      rgba(255, 255, 255, 0.25) 0%,
      rgba(255, 255, 255, 0) 70%
    );
    transform: scale(0);
    transition: transform 0.5s ease;
  }

  .boton-elegante:hover::after,
  .boton-elegante1:hover::after {
    transform: scale(4);
  }

  .boton-elegante:hover,
  .boton-elegante1:hover {
    border-color: #666666;
    background: #292929;
  }


  .images-container {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1100px;
    padding: 0 16px;
  }

  .image-box {
    flex: 1 1 300px;
    max-width: 500px;
    display: flex;
    justify-content: center;
  }

  .image-box img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    display: block;
  }


  @media (max-width: 768px) {
    .logo-img {
      width: 60px;
    }

    .title {
      font-size: 1.5rem;
    }

    .boton-elegante,
    .boton-elegante1 {
      padding: 10px 22px;
      font-size: 1rem;
    }

    .image-box {
      flex: 1 1 260px;
    }
  }


  @media (max-width: 480px) {
    .logo-img {
      width: 50px;
    }

    .title {
      font-size: 1.2rem;
    }

    .boton-elegante,
    .boton-elegante1 {
      padding: 9px 18px;
      font-size: 0.95rem;
    }

    .images-container {
      flex-direction: column;
      align-items: center;
    }

    .image-box {
      flex: unset;
      width: 90%;
      max-width: 100%;
    }
  }

</style>
</head>
<body>

  <img src="just-logo-1_edited.avif" alt="Logo" class="logo-img" />

  <div class="title-container">
    <u class="title">LokahiPis 2</u>
  </div>

  <div class="button-container">
    <a href="LokahiPis 2-1.html">
      <button class="boton-elegante1"><</button>
    </a>
    <a href="LokahiPis 2-3.html">
      <button class="boton-elegante">></button>
    </a>
  </div>

  <div class="images-container">
    <div class="image-box">
      <img src="Screenshot 2026-04-16 162044.png" alt="Screenshot 1" />
    </div>
    <div class="image-box">
      <img src="Screenshot 2026-04-16 162113.png" alt="Screenshot 2" />
    </div>
  </div>

</body>
</html>
